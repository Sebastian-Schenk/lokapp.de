services:
  web:
    image: nginx:1.27-alpine
    container_name: lokapp-web
    restart: unless-stopped

    volumes:
      - ./website:/usr/share/nginx/html:ro

    networks:
      proxy-net:
        aliases:
          - lokapp-web

  api:
    build:
      context: ./api
      dockerfile: Dockerfile

    container_name: lokapp-web-api
    restart: unless-stopped

    environment:
      NODE_ENV: production
      API_PORT: "3000"

      PUBLIC_BASE_URL: "https://lokapp.de"
      PRIVACY_VERSION: "2026-07-01"

      DB_HOST: "app-db"
      DB_PORT: "5432"
      DB_NAME: "lokapp_web"
      DB_USER: "lokapp_web_api"
      DB_PASSWORD: "${DB_PASSWORD}"

      SMTP_HOST: "mail.lokapp.de"
      SMTP_PORT: "587"
      SMTP_TLS_SERVERNAME: "mail.lokapp.de"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      SMTP_FROM: "LokApp Alpha <alpha@lokapp.de>"

    expose:
      - "3000"

    networks:
      proxy-net:
        aliases:
          - lokapp-web-api
      mailcow-network:

networks:
  proxy-net:
    external: true
    name: proxy-net

  mailcow-network:
    external: true
    name: mailcowdockerized_mailcow-network