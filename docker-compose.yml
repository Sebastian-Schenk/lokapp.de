services:
  web:
    image: nginx:1.27-alpine
    container_name: lokapp-web
    restart: unless-stopped

    volumes:
      - ./website:/usr/share/nginx/html:ro
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    networks:
      internal:
      proxy-net:
        aliases:
          - lokapp-web

  api:
    build:
      context: ./api
      dockerfile: Dockerfile

    container_name: lokapp-web-api
    restart: unless-stopped

    environment:
      NODE_ENV: production
      API_PORT: "3000"

      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      PRIVACY_VERSION: ${PRIVACY_VERSION}

      DB_HOST: app-db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: "587"
      SMTP_TLS_SERVERNAME: ${SMTP_TLS_SERVERNAME}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}

    expose:
      - "3000"

    networks:
      internal:
      proxy-net:
      mailcow-network:

networks:
  internal:
    driver: bridge

  proxy-net:
    external: true
    name: proxy-net

  mailcow-network:
    external: true
    name: mailcowdockerized_mailcow-network